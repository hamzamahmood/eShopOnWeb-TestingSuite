title: Update Subscription
type: object
properties:
  credit_card_attributes:
    $ref: "./Credit-Card-Attributes.yaml"
  product_handle:
    type: string
    description: Set to the handle of a different product to change the subscription's product
  product_id:
    type: integer
    description: Set to the id of a different product to change the subscription's product
  product_change_delayed:
    type: boolean
  next_product_id:
    type: string
    description: Set to an empty string to cancel a delayed product change.
  next_product_price_point_id:
    type: string
  snap_day:
    oneOf:
      - type: integer
        minimum: 1
        maximum: 28
      - type: string
        enum:
          - end
      - type: "null"
    description: Use for subscriptions with product eligible for calendar billing only. Value can be 1-28 or 'end'.
  initial_billing_at:
    type: string
    format: date-time
    description: "(Optional) Set this attribute to a future date/time to update a subscription in the Awaiting Signup Date state, to Awaiting Signup. In the Awaiting Signup state, a subscription behaves like any other. It can be canceled, allocated to, or have its billing date changed. etc. When the `initial_billing_at` date hits, the subscription will transition to the expected state. If the product has a trial, the subscription will enter a trial, otherwise it will go active. Setup fees will be respected either before or after the trial, as configured on the price point. If the payment is due at the initial_billing_at and it fails the subscription will be immediately canceled. You can omit the initial_billing_at date to activate the subscription immediately. See the [subscription import](https://maxio.zendesk.com/hc/en-us/articles/24251489107213-Advanced-Billing-Subscription-Imports#date-format) documentation for more information about Date/Time formats. "
  defer_signup:
    type: boolean
    default: false
    description: "(Optional) Set this attribute to true to move the subscription from Awaiting Signup, to Awaiting Signup Date. Use this when you want to update a subscription that has an unknown initial billing date. When the first billing date is known, update a subscription to set the `initial_billing_at` date. The subscription moves to the awaiting signup with a scheduled initial billing date. You can omit the initial_billing_at date to activate the subscription immediately. See [Subscription States](https://maxio-chargify.zendesk.com/hc/en-us/articles/5404222005773-Subscription-States) for more information."
  next_billing_at:
    type: string
    format: date-time
  expires_at:
    type: string
    format: date-time
    description: "Timestamp giving the expiration date of this subscription (if any). You may manually change the expiration date at any point during a subscription period."
  payment_collection_method:
    type: string
  receives_invoice_emails:
    type: boolean
  net_terms:
    type:
      - string
      - integer
  stored_credential_transaction_id:
    type: integer
  reference:
    type: string
  custom_price:
    $ref: "./Subscription-Custom-Price.yaml"
  components:
    type: array
    description: (Optional) An array of component ids and custom prices to be added to the subscription.
    items:
      $ref: "Update-Subscription-Component.yaml"
  dunning_communication_delay_enabled:
    type: boolean
    description: "Enable Communication Delay feature, making sure no communication (email or SMS) is sent to the Customer between 9PM and 8AM in time zone set by the `dunning_communication_delay_time_zone` attribute."
  dunning_communication_delay_time_zone:
    type:
      - string
      - "null"
    example: '"Eastern Time (US & Canada)"'
    description: Time zone for the Dunning Communication Delay feature.
  product_price_point_id:
    type: integer
    description: Set to change the current product's price point.
  product_price_point_handle:
    type: string
    description: Set to change the current product's price point.
