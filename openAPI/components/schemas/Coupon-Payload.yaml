title: Coupon Payload
type: object
properties:
  name:
    type: string
    description: "Required when creating a new coupon. This name is not displayed to customers and is limited to 255 characters."
  code:
    type: string
    description: "Required when creating a new coupon. The code is limited to 255 characters. May contain uppercase alphanumeric characters and these special characters (which allow for email addresses to be used): “%”, “@”, “+”, “-”, “_”, and “.”"
  description:
    type: string
    description: "Required when creating a new coupon. A description of the coupon that can be displayed to customers in transactions and on statements. The description is limited to 255 characters."
  percentage:
    type:
      - string
      - number
    description: "Required when creating a new percentage coupon. Can't be used together with amount_in_cents. Percentage discount"
  amount_in_cents:
    type: integer
    format: int64
    description: "Required when creating a new flat amount coupon. Can't be used together with percentage. Flat USD discount"
  allow_negative_balance:
    type: boolean
    description: "If set to true, discount is not limited (credits will carry forward to next billing). Can't be used together with restrictions."
  recurring:
    type: boolean
  end_date:
    format: date
    type: string
    description: "After the end of the given day, this coupon code will be invalid for new signups. Recurring discounts started before this date will continue to recur even after this date."
  product_family_id:
    type: string
  stackable:
    type: boolean
    description: "A stackable coupon can be combined with other coupons on a Subscription."
  compounding_strategy:
    $ref: "./Compounding-Strategy.yaml"
  exclude_mid_period_allocations:
    type: boolean
  apply_on_cancel_at_end_of_period:
    type: boolean
  apply_on_subscription_expiration:
    type: boolean
