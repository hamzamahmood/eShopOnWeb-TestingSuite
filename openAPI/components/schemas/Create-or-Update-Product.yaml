title: Create or Update Product
type: object
properties:
  name:
    type: string
    description: The product name
  handle:
    type: string
    description: The product API handle
  description:
    type: string
    description: The product description
  accounting_code:
    type: string
    description: "E.g. Internal ID or SKU Number"
  require_credit_card:
    type: boolean
    description: "Deprecated value that can be ignored unless you have legacy hosted pages. For Public Signup Page users, read this attribute from under the signup page."
  price_in_cents:
    type: integer
    format: int64
    description: "The product price, in integer cents"
  interval:
    type: integer
    description: The numerical interval. i.e. an interval of ‘30’ coupled with an interval_unit of day would mean this product would renew every 30 days
  interval_unit:
    allOf:
      - $ref: "./Interval-Unit.yaml"
    description: "A string representing the interval unit for this product, either month or day"
  trial_price_in_cents:
    type: integer
    format: int64
    description: The product trial price, in integer cents
  trial_interval:
    type: integer
    description: "The numerical trial interval. i.e. an interval of ‘30’ coupled with a trial_interval_unit of day would mean this product trial would last 30 days."
  trial_interval_unit:
    oneOf:
      - $ref: "./Interval-Unit.yaml"
      - type: "null"
    description: "A string representing the trial interval unit for this product, either month or day"
  trial_type:
    oneOf:
      - $ref: "./Trial-Type.yaml"
      - type: "null"
    description: "Indicates how a trial is handled when the trail period ends and there is no credit card on file. For `no_obligation`, the subscription transitions to a Trial Ended state. Maxio will not send any emails or statements. For `payment_expected`, the subscription transitions to a Past Due state. Maxio will send normal dunning emails and statements according to your other settings."
  expiration_interval:
    type: integer
    description: "The numerical expiration interval. i.e. an expiration_interval of ‘30’ coupled with an expiration_interval_unit of day would mean this product would expire after 30 days."
  expiration_interval_unit:
    oneOf:
      - $ref: "./Expiration-Interval-Unit.yaml"
      - type: "null"
    description: "A string representing the expiration interval unit for this product, either month, day or never"
  auto_create_signup_page:
    type: boolean
  tax_code:
    type: string
    description: A string representing the tax code related to the product type. This is especially important when using the Avalara service to tax based on locale. This attribute has a max length of 10 characters.
    maxLength: 10
required:
  - name
  - description
  - price_in_cents
  - interval
  - interval_unit
